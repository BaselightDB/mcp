name: Release MCP Bundle

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: mcpb
        run: npm ci

      - name: Read release version
        id: version
        working-directory: mcpb
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          echo "number=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Releasing version ${VERSION}"

      - name: Ensure tag does not exist
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "::error::Tag ${TAG} already exists — bump the version in mcpb/manifest.json before releasing."
            exit 1
          fi
          echo "Tag ${TAG} is available."

      - name: Validate manifest
        working-directory: mcpb
        run: npx @anthropic-ai/mcpb validate manifest.json

      - name: Package bundle
        working-directory: mcpb
        run: npm run pack

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: baselight-${{ steps.version.outputs.number }}
          path: mcpb/baselight.mcpb

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: mcpb/baselight.mcpb
          generate_release_notes: true